# values.yaml
airflowVersion: "2.11.0"

images:
  airflow:
    repository: banvic-airflow-custom
    tag: v1
    pullPolicy: Never

executor: "LocalExecutor"

postgresql:
  enabled: true

# Secret do Webserver (chave Flask) — ver banvic-secrets.example.yaml
webserverSecretKeySecretName: banvic-secrets

# Variáveis para o Meltano (herdadas pelos pods do Airflow)
env:
  - name: DB_HOST
    value: "airflow-postgresql"
  - name: DB_PORT
    value: "5432"
  - name: DB_USER
    value: "postgres"
  - name: DB_DATABASE
    value: "postgres"
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: banvic-secrets
        key: db-password

# Conexão postgres_default da DAG — lida do Secret (sem senha no código)
secret:
  - envName: AIRFLOW_CONN_POSTGRES_DEFAULT
    secretName: banvic-secrets
    secretKey: airflow-conn-postgres-default

dags:
  persistence:
    enabled: false

scheduler:
  enabled: true

webserver:
  enabled: true
