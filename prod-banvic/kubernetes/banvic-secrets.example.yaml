# Template de Secret do Kubernetes — NÃO commitar valores reais.
#
# 1. Copie este arquivo:
#    cp banvic-secrets.example.yaml banvic-secrets.yaml
#
# 2. Edite banvic-secrets.yaml com suas credenciais.
#
# 3. Aplique no cluster (antes do helm install):
#    kubectl apply -f banvic-secrets.yaml
#
# O arquivo banvic-secrets.yaml está no .gitignore.

apiVersion: v1
kind: Secret
metadata:
  name: banvic-secrets
  namespace: airflow
type: Opaque
stringData:
  db-password: "postgres"
  webserver-secret-key: "altere-para-uma-chave-aleatoria"
  airflow-conn-postgres-default: "postgresql://postgres:postgres@airflow-postgresql:5432/postgres"
