version: 1
default_environment: dev
environments:
- name: dev
- name: staging
- name: prod
plugins:
  extractors:
  - name: tap-csv
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-csv.git
    config:
      files:
      - entity: agencias
        path: data/raw/agencias.csv
        keys: [cod_agencia]
      - entity: clientes
        path: data/raw/clientes.csv
        keys: [cod_cliente]
      - entity: colaborador_agencia
        path: data/raw/colaborador_agencia.csv
        keys: [cod_colaborador, cod_agencia]
      - entity: colaboradores
        path: data/raw/colaboradores.csv
        keys: [cod_colaborador]
      - entity: contas
        path: data/raw/contas.csv
        keys: [num_conta]
      - entity: propostas_credito
        path: data/raw/propostas_credito.csv
        keys: [cod_proposta]
      - entity: transacoes
        path: data/raw/transacoes.csv
        keys: [cod_transacao]
  loaders:
  - name: target-postgres
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/target-postgres.git
    config:
      host: $DB_HOST
      port: $DB_PORT
      user: $DB_USER
      password: $DB_PASSWORD
      database: $DB_DATABASE
      schema: raw_banvic
